<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F4EEE4">
<title>Kelime Çalışma · 450</title>
<style>
:root{
  --paper:#F4EEE4;
  --paper-2:#EFE7DA;
  --surface:#FFFDF9;
  --ink:#2B2520;
  --ink-soft:#5C5247;
  --muted:#9A8E7E;
  --line:#E2D8C8;
  --coral:#D55B36;
  --coral-soft:#FBE7DE;
  --teal:#2E7D6F;
  --teal-soft:#DCEDE9;
  --gold:#C99A2E;
  --green:#3F8F5B;
  --green-soft:#DDEEE1;
  --red:#C2452F;
  --red-soft:#F7E0DB;
  --shadow:0 1px 2px rgba(43,37,32,.05),0 8px 24px rgba(43,37,32,.07);
  --shadow-lg:0 12px 40px rgba(43,37,32,.16);
  --r:18px;
  --serif:ui-serif,"New York",Georgia,"Times New Roman",serif;
  --round:ui-rounded,"SF Pro Rounded",system-ui,-apple-system,"Segoe UI",sans-serif;
  --nav-h:calc(64px + env(safe-area-inset-bottom));
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%}
body{
  font-family:var(--round);
  background:var(--paper);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
  background-image:radial-gradient(circle at 1px 1px, rgba(43,37,32,.04) 1px, transparent 0);
  background-size:22px 22px;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit}

#app{max-width:560px;margin:0 auto;min-height:100%;position:relative;padding-bottom:var(--nav-h)}

/* Header */
.topbar{
  position:sticky;top:0;z-index:30;
  padding:calc(env(safe-area-inset-top) + 14px) 18px 12px;
  background:linear-gradient(180deg,var(--paper) 70%, rgba(244,238,228,0));
}
.topbar h1{margin:0;font-size:15px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600}
.topbar .big{font-family:var(--serif);font-size:26px;font-weight:600;letter-spacing:-.01em;color:var(--ink);margin-top:2px;display:flex;align-items:baseline;gap:9px}
.topbar .big .count{font-family:var(--round);font-size:13px;color:var(--coral);background:var(--coral-soft);padding:3px 9px;border-radius:999px;font-weight:600;letter-spacing:0;text-transform:none}

.view{display:none;padding:6px 18px 26px;animation:fade .35s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* Bottom nav */
nav.tabs{
  position:fixed;left:0;right:0;bottom:0;z-index:40;
  display:flex;max-width:560px;margin:0 auto;
  background:rgba(255,253,249,.86);
  backdrop-filter:saturate(180%) blur(18px);
  -webkit-backdrop-filter:saturate(180%) blur(18px);
  border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom);
}
nav.tabs button{flex:1;padding:9px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-size:11px;font-weight:600;transition:color .2s}
nav.tabs button .ic{width:25px;height:25px;display:block}
nav.tabs button.on{color:var(--coral)}
nav.tabs button:active{transform:scale(.92)}

/* ---------- LIST ---------- */
.search{position:relative;margin:4px 0 14px}
.search input{
  width:100%;padding:14px 16px 14px 44px;font-size:16px;border-radius:14px;
  border:1.5px solid var(--line);background:var(--surface);color:var(--ink);outline:none;
  box-shadow:var(--shadow);transition:border-color .2s
}
.search input:focus{border-color:var(--coral)}
.search .mag{position:absolute;left:15px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--muted)}
.search .clr{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:28px;height:28px;border-radius:50%;display:none;align-items:center;justify-content:center;color:var(--muted);background:var(--paper-2)}
.search .clr.show{display:flex}
.list-meta{font-size:12.5px;color:var(--muted);margin:0 4px 10px;font-weight:600}
.wcard{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
  padding:14px 15px;margin-bottom:9px;box-shadow:var(--shadow);
  display:flex;align-items:center;gap:12px;transition:transform .12s
}
.wcard:active{transform:scale(.985)}
.wcard .txt{flex:1;min-width:0}
.wcard .w{font-family:var(--serif);font-size:18.5px;font-weight:600;color:var(--ink);line-height:1.15}
.wcard .m{font-size:13.5px;color:var(--ink-soft);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wcard .chev{color:var(--muted);width:18px;height:18px;flex:none}
.tag{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.04em;padding:2px 7px;border-radius:6px;background:var(--teal-soft);color:var(--teal);vertical-align:middle;margin-left:6px}
.empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:15px}

/* Detail sheet */
.sheet-bg{position:fixed;inset:0;background:rgba(43,37,32,.32);z-index:50;opacity:0;pointer-events:none;transition:opacity .28s;backdrop-filter:blur(2px)}
.sheet-bg.open{opacity:1;pointer-events:auto}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:51;max-width:560px;margin:0 auto;
  background:var(--surface);border-radius:26px 26px 0 0;
  padding:10px 22px calc(30px + env(safe-area-inset-bottom));
  transform:translateY(100%);transition:transform .34s cubic-bezier(.22,1,.36,1);
  box-shadow:var(--shadow-lg);max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch
}
.sheet.open{transform:translateY(0)}
.grab{width:38px;height:5px;border-radius:3px;background:var(--line);margin:6px auto 16px}
.sheet .dw{font-family:var(--serif);font-size:32px;font-weight:600;line-height:1.1;letter-spacing:-.01em}
.sheet .dm{font-size:17px;color:var(--coral);font-weight:600;margin-top:6px}
.field{margin-top:20px}
.field .lab{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:6px}
.field .val{margin-top:7px;font-size:16px;line-height:1.5;color:var(--ink)}
.field .val.coll{font-style:normal;color:var(--teal);font-weight:600}
.field .val.ex{color:var(--ink-soft);background:var(--paper-2);padding:13px 15px;border-radius:13px;border-left:3px solid var(--gold)}
.field .val .hl{background:linear-gradient(transparent 55%, var(--coral-soft) 55%);font-weight:600;color:var(--ink)}

/* ---------- FLASHCARDS ---------- */
.fc-wrap{display:flex;flex-direction:column;align-items:center;padding-top:6px}
.fc-bar{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
.fc-prog{flex:1;height:7px;background:var(--paper-2);border-radius:4px;overflow:hidden}
.fc-prog i{display:block;height:100%;background:var(--coral);border-radius:4px;transition:width .3s;width:0}
.fc-num{font-size:13px;font-weight:700;color:var(--ink-soft);min-width:74px;text-align:right}
.pill-btn{font-size:12.5px;font-weight:700;padding:7px 13px;border-radius:999px;background:var(--surface);border:1.5px solid var(--line);color:var(--ink-soft);display:inline-flex;align-items:center;gap:5px;box-shadow:var(--shadow)}
.pill-btn:active{transform:scale(.94)}
.fc-toolbar{display:flex;gap:8px;width:100%;margin-bottom:14px}
.fc-toolbar .pill-btn{flex:1;justify-content:center}
.fc-toolbar .pill-btn.on{background:var(--coral);border-color:var(--coral);color:#fff}

.card{
  width:100%;aspect-ratio:3/4;max-height:62vh;perspective:1600px;margin-bottom:18px;cursor:pointer
}
.card-inner{position:relative;width:100%;height:100%;transition:transform .55s cubic-bezier(.22,1,.36,1);transform-style:preserve-3d}
.card.flipped .card-inner{transform:rotateY(180deg)}
.face{
  position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border-radius:26px;background:var(--surface);border:1px solid var(--line);box-shadow:var(--shadow-lg);
  display:flex;flex-direction:column;justify-content:center;padding:26px;overflow:hidden
}
.face::before{content:"";position:absolute;top:0;left:0;right:0;height:6px;background:linear-gradient(90deg,var(--coral),var(--gold))}
.face .crn{position:absolute;top:18px;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.face .crn.l{left:22px}.face .crn.r{right:22px}
.front{align-items:center;text-align:center}
.front .word{font-family:var(--serif);font-size:38px;font-weight:600;line-height:1.1;letter-spacing:-.01em}
.front .hint{margin-top:auto;font-size:12.5px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:6px}
.back{transform:rotateY(180deg);justify-content:flex-start;overflow-y:auto}
.back .bw{font-family:var(--serif);font-size:22px;font-weight:600;margin-top:22px}
.back .bm{font-size:19px;color:var(--coral);font-weight:600;margin-top:4px}
.back .bsec{margin-top:16px}
.back .bsec .l{font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.back .bsec .v{font-size:15px;margin-top:5px;line-height:1.45}
.back .bsec .v.coll{color:var(--teal);font-weight:600}
.back .bsec .v.ex{color:var(--ink-soft);font-style:italic}
.back .bsec .v.ex .hl{font-style:normal;font-weight:600;color:var(--ink);background:linear-gradient(transparent 55%, var(--coral-soft) 55%)}
.fc-actions{display:flex;gap:12px;width:100%}
.fc-actions button{flex:1;padding:16px;border-radius:16px;font-size:15px;font-weight:700;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;gap:7px;transition:transform .12s}
.fc-actions button:active{transform:scale(.96)}
.btn-no{background:var(--surface);border:1.5px solid var(--line);color:var(--ink-soft)}
.btn-yes{background:var(--green);color:#fff}
.btn-yes.known{background:var(--green-soft);color:var(--green)}

/* ---------- QUIZ ---------- */
.q-setup,.q-done{text-align:center;padding-top:8px}
.q-head{font-family:var(--serif);font-size:24px;font-weight:600;margin-bottom:6px}
.q-sub{color:var(--ink-soft);font-size:14.5px;margin-bottom:22px;line-height:1.5}
.seg{display:flex;background:var(--paper-2);border-radius:14px;padding:4px;margin-bottom:14px}
.seg button{flex:1;padding:11px;border-radius:11px;font-size:14px;font-weight:700;color:var(--ink-soft);transition:.2s}
.seg button.on{background:var(--surface);color:var(--coral);box-shadow:var(--shadow)}
.big-btn{width:100%;padding:17px;border-radius:16px;background:var(--coral);color:#fff;font-size:16px;font-weight:700;box-shadow:var(--shadow);margin-top:6px;transition:transform .12s}
.big-btn:active{transform:scale(.97)}
.big-btn.ghost{background:var(--surface);border:1.5px solid var(--line);color:var(--ink)}
.q-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.q-count{font-size:13px;font-weight:700;color:var(--muted)}
.q-score{font-size:13px;font-weight:700;color:var(--green)}
.q-prog{height:7px;background:var(--paper-2);border-radius:4px;overflow:hidden;margin-bottom:24px}
.q-prog i{display:block;height:100%;background:var(--coral);transition:width .3s}
.q-prompt{text-align:center;margin-bottom:8px;font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.q-word{font-family:var(--serif);text-align:center;font-size:34px;font-weight:600;line-height:1.15;margin-bottom:28px;color:var(--ink)}
.q-opts{display:flex;flex-direction:column;gap:11px}
.q-opt{
  padding:16px 17px;border-radius:15px;background:var(--surface);border:1.5px solid var(--line);
  text-align:left;font-size:16px;font-weight:600;color:var(--ink);box-shadow:var(--shadow);transition:.18s;line-height:1.35
}
.q-opt:active{transform:scale(.98)}
.q-opt.correct{background:var(--green-soft);border-color:var(--green);color:var(--green)}
.q-opt.wrong{background:var(--red-soft);border-color:var(--red);color:var(--red)}
.q-opt.dim{opacity:.5}
.q-next{margin-top:18px}
.scorebig{font-family:var(--serif);font-size:60px;font-weight:600;color:var(--coral);line-height:1}
.scoremsg{font-size:16px;color:var(--ink-soft);margin:10px 0 26px;font-weight:600}

/* ---------- MATCH ---------- */
.m-setup{text-align:center;padding-top:8px}
.m-stat{display:flex;justify-content:space-between;margin-bottom:16px;font-size:13px;font-weight:700;color:var(--ink-soft)}
.m-cols{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.m-col{display:flex;flex-direction:column;gap:10px}
.m-item{
  padding:15px 12px;border-radius:14px;background:var(--surface);border:1.5px solid var(--line);
  font-size:15px;font-weight:600;text-align:center;box-shadow:var(--shadow);transition:.16s;min-height:58px;
  display:flex;align-items:center;justify-content:center;line-height:1.25
}
.m-item.en{font-family:var(--serif);font-size:16.5px}
.m-item:active{transform:scale(.96)}
.m-item.sel{background:var(--coral);border-color:var(--coral);color:#fff}
.m-item.done{background:var(--green-soft);border-color:var(--green-soft);color:var(--green);opacity:.55;pointer-events:none}
.m-item.bad{background:var(--red-soft);border-color:var(--red);color:var(--red);animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

.confetti{position:fixed;inset:0;pointer-events:none;z-index:60}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <h1 id="bar-title">Kelime Çalışma</h1>
    <div class="big"><span id="bar-sub">Liste</span><span class="count" id="bar-count">450 kelime</span></div>
  </div>

  <!-- LIST -->
  <section class="view active" id="v-list">
    <div class="search">
      <svg class="mag" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input id="q" type="search" inputmode="search" autocomplete="off" autocorrect="off" placeholder="Kelime, anlam, örnek ara…">
      <button class="clr" id="clr" aria-label="Temizle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" width="15" height="15"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    </div>
    <div class="list-meta" id="list-meta"></div>
    <div id="list"></div>
  </section>

  <!-- FLASHCARDS -->
  <section class="view" id="v-cards">
    <div class="fc-wrap">
      <div class="fc-toolbar">
        <button class="pill-btn" id="fc-shuffle"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>Karıştır</button>
        <button class="pill-btn" id="fc-onlyunknown">Sadece bilinmeyen</button>
        <button class="pill-btn" id="fc-reset">Sıfırla</button>
      </div>
      <div class="fc-bar">
        <div class="fc-prog"><i id="fc-prog"></i></div>
        <div class="fc-num" id="fc-num">1 / 450</div>
      </div>
      <div class="card" id="card">
        <div class="card-inner">
          <div class="face front">
            <span class="crn l">İngilizce</span>
            <span class="crn r" id="fc-knownbadge"></span>
            <div class="word" id="fc-word">—</div>
            <div class="hint"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 18 0 9 9 0 0 0-18 0"/><path d="M12 8v8M8 12h8"/></svg>Çevirmek için dokun</div>
          </div>
          <div class="face back">
            <span class="crn l">Türkçe</span>
            <div class="bw" id="fc-bword"></div>
            <div class="bm" id="fc-bmean"></div>
            <div class="bsec" id="fc-bcoll-w"><div class="l">Collocation</div><div class="v coll" id="fc-bcoll"></div></div>
            <div class="bsec"><div class="l">Örnek Cümle</div><div class="v ex" id="fc-bex"></div></div>
          </div>
        </div>
      </div>
      <div class="fc-actions">
        <button class="btn-no" id="fc-prev"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M15 18l-6-6 6-6"/></svg>Önceki</button>
        <button class="btn-yes" id="fc-know">Biliyorum</button>
        <button class="btn-no" id="fc-next">Sonraki<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M9 6l6 6-6 6"/></svg></button>
      </div>
    </div>
  </section>

  <!-- QUIZ -->
  <section class="view" id="v-quiz">
    <div id="quiz-root"></div>
  </section>

  <!-- MATCH -->
  <section class="view" id="v-match">
    <div id="match-root"></div>
  </section>
</div>

<!-- Detail sheet -->
<div class="sheet-bg" id="sheet-bg"></div>
<div class="sheet" id="sheet">
  <div class="grab"></div>
  <div class="dw" id="d-word"></div>
  <div class="dm" id="d-mean"></div>
  <div class="field" id="d-coll-f"><div class="lab"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 12h8M12 8v8"/><rect x="3" y="3" width="18" height="18" rx="4"/></svg>Collocation</div><div class="val coll" id="d-coll"></div></div>
  <div class="field" id="d-theme-f"><div class="lab">Tema</div><div class="val" id="d-theme"></div></div>
  <div class="field"><div class="lab"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h10"/></svg>Örnek Cümle</div><div class="val ex" id="d-ex"></div></div>
</div>

<nav class="tabs">
  <button data-tab="list" class="on"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M8 6h12M8 12h12M8 18h12M3.5 6h.01M3.5 12h.01M3.5 18h.01"/></svg>Liste</button>
  <button data-tab="cards"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><rect x="3" y="5" width="14" height="16" rx="2.5"/><path d="M7 5V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v13a2 2 0 0 1-2 2h-1"/></svg>Kartlar</button>
  <button data-tab="quiz"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M9.5 9a2.5 2.5 0 1 1 3.6 2.2c-.9.5-1.6 1.2-1.6 2.3"/><circle cx="11.5" cy="17" r=".6" fill="currentColor"/><circle cx="12" cy="12" r="9.5"/></svg>Quiz</button>
  <button data-tab="match"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><rect x="3" y="4" width="7" height="7" rx="2"/><rect x="14" y="4" width="7" height="7" rx="2"/><rect x="3" y="14" width="7" height="7" rx="2"/><rect x="14" y="14" width="7" height="7" rx="2"/><path d="M10 7.5h4M7.5 11v3M16.5 11v3"/></svg>Eşleştir</button>
</nav>

<script>

production.","e":"A dominance hierarchy refers to the fact that some individuals within a group constantly gain greater access than other individuals to key resources – resources that contribute to survival or reproduction.","t":""},{"w":"Unrestricted","m":"Sınırsız, kısıtlanmamış.","c":"unrestricted access.","e":"Because high-status individuals are known to gain unrestricted access to key resources that enhance survival and reproduction...","t":""},{"w":"Insubordination","m":"İtaatsizlik, başkaldırı.","c":"fire for insubordination.","e":"Your boss might fire you for insubordination.","t":""},{"w":"Cultivation","m":"Geliştirme, yetiştirme.","c":"cultivation of democracy.","e":"...and whose contribution to the cultivation of democracy as a stateswoman, university lecturer, and private citizen is incomparable...","t":""},{"w":"Dissolution","m":"Dağılma, feshetme.","c":"dissolution of a country.","e":"Vaclav Havel, a Czech statesman... who served as the last President of Czechoslovakia from 1989 until the dissolution of Czechoslovakia...","t":""},{"w":"Deteriorate","m":"Kötüleşmek, bozulmak.","c":"deteriorating conditions.","e":"Hugo Chávez's recent rise to power in 1999 to power was fueled by deteriorating social and economic conditions and growing inequality in Venezuela.","t":""},{"w":"Repressive","m":"Baskıcı, ezici.","c":"repressive Prime Minister.","e":"In modern Hungary, the corruption and dishonesty of the governing Socialist party paved the way for Orban, the repressive Prime Minister of Hungary since 2010.","t":""},{"w":"Fabricate","m":"Uydurmak, icat etmek (yalan/sahte).","c":"fabricate untruths.","e":"Those in power simply fabricate and then will accuse anyone who disagrees with them of being the 'real' falsifier...","t":""},{"w":"Ridicule","m":"Alay, dalga geçme.","c":"ridicule and teasing.","e":"There is ridicule and teasing of the more polite language of 'political correctness.'","t":""},{"w":"Rhetoric","m":"Retorik, söylem (genelde etkileyici ama boş konuşma).","c":"heated rhetoric.","e":"...Democrats and Republicans must work together again to solve the country's problems and not continue the heated rhetoric of the recent past.","t":""},{"w":"Superior","m":"Üstün, daha iyi.","c":"superior recall ability.","e":"The superior recall ability of experts has been explained in terms of how they 'chunk' various elements of a configuration...","t":""},{"w":"Manipulate","m":"İşlemek, yönlendirmek, manipüle etmek.","c":"manipulating information.","e":"There are limits on the amount of information that people can hold in short-term memory, which refers to the mental process of temporarily retaining and manipulating information...","t":""},{"w":"Rationale","m":"Temel neden, gerekçe.","c":"rationale for.","e":"Experts usually mentioned the major principle(s) or law(s) that were applicable to the problem, together with a rationale for why those laws applied...","t":""},{"w":"Contradictory","m":"Çelişkili, tutarsız.","c":"contradictory claims.","e":"They had no systematic way of making sense of contradictory claims.","t":""},{"w":"Overwhelm","m":"Bunalmak, üstesinden gelmek (gücüyle ezmek).","c":"overwhelm working memory.","e":"Experts do not have to search through everything they know in order to find what is relevant; such an approach would overwhelm their working memory.","t":""},{"w":"Persuasion","m":"İkna etme, inandırma.","c":"concept of persuasion.","e":"Much of the research of social psychologists has widespread popular appeal, largely because it so often deals with problems that are of constant concern to all – problems related to such concepts as... cooperation, competition, persuasion, leadership...","t":""},{"w":"Allocate","m":"Tahsis etmek, ayırmak.","c":"resources are allocated.","e":"As a result, resources may be allocated inefficiently.","t":""},{"w":"Transgression","m":"Kural ihlali, haddini aşma.","c":"public transgressions.","e":"Transgressions are regulated by a complex economy of honor, which ranks individuals and families and thereby controls their behavior.","t":""},{"w":"Prone","m":"Eğilimli, yatkın.","c":"prone to conformity.","e":"One important implication of these studies is that cultures outside Western Europe and North America may be more prone to conformity.","t":""},{"w":"Individual","m":"Birey, kişi. (Sıfat olarak: bireysel, tekil).","c":"individual behavior (bireysel davranış), high-status individuals (yüksek statülü bireyler), individual needs (bireysel ihtiyaçlar).","e":"Inherent in the structure of all human societies is the inevitability of a sense of frustration for the individual.","t":""},{"w":"Behavior (Behaviour)","m":"Davranış, tutum, hareket biçimi.","c":"competitive behavior (rekabetçi davranış), aggressive behavior (agresif/saldırgan davranış), group behavior (grup davranışı).","e":"Thus, a behavior that we choose to think of as conformity may have a different meaning when it is located within a different context.","t":""},{"w":"Society","m":"Toplum, cemiyet.","c":"human society (insan toplumu), modern societies (modern toplumlar), traditional societies (geleneksel toplumlar).","e":"In every level of human society, people continuously affirm one another in various ways...","t":""},{"w":"Research","m":"Araştırma, bilimsel çalışma, inceleme.","c":"cross-cultural research (kültürlerarası araştırma), pioneering research (öncü araştırma), recent research (son araştırmalar).","e":"Cross-cultural research has revealed variations in children's thinking about wealth and poverty according to nationality.","t":""},{"w":"Process","m":"Süreç, işlem, gidişat.","c":"cognitive process (bilişsel süreç), socialization process (sosyalleşme süreci), decision-making process (karar verme süreci).","e":"For the developing children, an important part of the process of growing up is acquiring an understanding of these institutions...","t":""},{"w":"Environment","m":"Çevre, ortam.","c":"social environment (sosyal çevre), unstable environment (istikrarsız ortam), high-stress environment (yüksek stresli ortam).","e":"The term socialization refers to the ways in which an individual's behavior is influenced toward conformity with the general behavior patterns found within his social environment.","t":""},{"w":"Effect","m":"Etki, sonuç.","c":"destructive effects (yıkıcı etkiler), profound effect (derin etki), inhibitory effect (engelleyici/bastırıcı etki).","e":"Particularly where there is a premium on originality, the group appears to exercise an inhibitory effect on the most original of its members.","t":""},{"w":"Response","m":"Tepki, cevap, yanıt.","c":"direct response (doğrudan tepki), instinctual responses (içgüdüsel tepkiler), tangential response (konu dışı/dolaylı tepki).","e":"The mother's response to the boy is an example of what Ruesch has called a tangential response...","t":""},{"w":"Condition","m":"Durum, koşul, şart, (tıbbi) rahatsızlık.","c":"neurological condition (nörolojik rahatsızlık), psychological conditions (psikolojik durumlar), deteriorating conditions (kötüleşen şartlar).","e":"Hugo Chávez's recent rise to power in 1999 to power was fueled by deteriorating social and economic conditions and growing inequality in Venezuela.","t":""},{"w":"Development","m":"Gelişim, gelişme, büyüme.","c":"cognitive development (bilişsel gelişim), economic development (ekonomik kalkınma), child's development (çocuğun gelişimi).","e":"The role of capital in economic development has been widely recognized and extensively discussed in the literature.","t":""},{"w":"Group","m":"Grup, topluluk.","c":"minority group (azınlık grubu), peer group (akran grubu), group membership (grup üyeliği).","e":"Two factors appear to be important in determining the degree to which an individual displays prejudice and the nature of the prejudice displayed. One is the individual's particular personality, and the second is group membership.","t":""},{"w":"Result","m":"Sonuç, netice (Ayrıca 'result from' kalıbıyla \"kaynaklanmak\", 'result in' kalıbıyla \"-ile sonuçlanmak\" anlamındadır).","c":"startling result (şaşırtıcı sonuç), negative result (olumsuz sonuç).","e":"The most startling result occurred when the woman was high and the man low in dominance.","t":""},{"w":"Conflict","m":"Çatışma, uyuşmazlık, anlaşmazlık.","c":"motivational conflict (motivasyonel çatışma), personality conflicts (kişilik çatışmaları), intergroup conflict (gruplararası çatışma).","e":"When people live together, frustration often derives from a conflict between personal wants and society's restraints and prohibitions...","t":""},{"w":"Study","m":"Çalışma, deney, araştırma.","c":"longitudinal study (boylamsal çalışma), replication study (tekrarlama çalışması), experimental study (deneysel çalışma).","e":"In their study, Berti and Bombi state that though children's understanding of money constantly develops, there are also children who might fall behind their peers...","t":""},{"w":"Theory","m":"Teori, kuram.","c":"dominance theory (baskınlık teorisi), theory of evolution (evrim teorisi), economic theories (ekonomik teoriler).","e":"Dominance theory predicts that human reasoning will be strongly influenced by rank, and there is some empirical support for this proposition.","t":""},{"w":"Experience","m":"Deneyim, tecrübe (İsim); Deneyimlemek, yaşamak (Fiil).","c":"sensory experience (duyusal deneyim), individual experience (bireysel deneyim).","e":"The nature of the immigrant experience often shapes attitudes toward the host society.","t":""},{"w":"Influence","m":"Etki (isim), etkilemek (fiil).","c":"strongly influenced (güçlü bir şekilde etkilenmiş), influence behavior (davranışı etkilemek), social influence (sosyal etki).","e":"Dominance theory predicts that human reasoning will be strongly influenced by rank...\" (Baskınlık teorisi, insan muhakemesinin rütbeden (statüden) güçlü bir şekilde etkileneceğini öngörür...)","t":""},{"w":"Observe / Observation","m":"Gözlemlemek / Gözlem. (Özellikle deney ve bulgu anlatan metinlerde sürekli geçer).","c":"widely observed (yaygın olarak gözlemlenen), empirical observation (ampirik gözlem).","e":"Status and social dominance are phenomena widely observed throughout the animal world from crayfish to humans.\" (Statü ve sosyal baskınlık, kerevitlerden insanlara kadar hayvanlar aleminde yaygın olarak gözlemlenen olgulardır)","t":""},{"w":"Occur","m":"Meydana gelmek, olmak, gerçekleşmek.","c":"changes that occur (meydana gelen değişiklikler), commonly occur (yaygın olarak meydana gelmek).","e":"Psychologists study motivational forces to help explain observed changes in behavior that occur in an individual.\" (Psikologlar, bir bireyde meydana gelen gözlemlenmiş davranış değişikliklerini açıklamaya yardımcı olmak için motivasyonel güçleri incelerler)","t":""},{"w":"Require","m":"Gerektirmek, ihtiyacı olmak.","c":"require empathy (empati gerektirmek), require a different approach (farklı bir yaklaşım gerektirmek).","e":"And to understand how our behavior affects others requires empathy.\" (Ve davranışlarımızın başkalarını nasıl etkilediğini anlamak empati gerektirir)","t":""},{"w":"Function","m":"İşlev (isim), işlev göstermek / çalışmak (fiil).","c":"function appropriately (uygun şekilde işlev göstermek/çalışmak), biological function (biyolojik işlev).","e":"...so that by the time adulthood is reached, they are able to function appropriately within this societal framework.\" (...böylece yetişkinliğe ulaşıldığında, bu toplumsal çerçeve içinde uygun şekilde işlev görebilirler)","t":""},{"w":"Structure","m":"Yapı.","c":"social structure (sosyal yapı), hierarchical structure (hiyerarşik yapı).","e":"Inherent in the structure of all human societies is the inevitability of a sense of frustration for the individual.\" (Tüm insan toplumlarının yapısının doğasında, birey için hüsran hissinin kaçınılmazlığı vardır)","t":""},{"w":"Determine","m":"Belirlemek, saptamak.","c":"determine whether (olup olmadığını belirlemek), determine the degree (derecesini belirlemek).","e":"Milgram's goal was to determine whether or not we obey an authority figure even when that figure makes unreasonable demands...\" (Milgram'ın amacı, bir otorite figürü mantıksız taleplerde bulunduğunda bile ona itaat edip etmediğimizi belirlemekti...)","t":""},{"w":"Tend (to)","m":"Eğiliminde olmak, -e meyilli olmak. (Akademik metinlerin en sevdiği fiillerdendir, kesinlikten kaçınmak için kullanılır).","c":"tend to view (görme eğiliminde olmak), tend to expect (bekleme eğiliminde olmak).","e":"...those who are younger or more educated tend to view animals with compassion.\" (...daha genç veya daha eğitimli olanlar hayvanları şefkatle görme eğilimindedir)","t":""},{"w":"Involve","m":"İçermek, kapsamak, gerektirmek.","c":"involve a conflict (bir çatışma içermek), issues involved (ilgili sorunlar/konular).","e":"Perhaps the simplest case of a short-term motivational conflict involves the confrontation of a single approach motive by a single avoidance motive...\" (Belki de kısa vadeli motivasyonel bir çatışmanın en basit durumu, tek bir yaklaşma güdüsü ile tek bir kaçınma güdüsünün karşı karşıya gelmesini içerir...)","t":""},{"w":"Consequence","m":"Sonuç (genellikle olumsuz/doğal bir sonuç).","c":"consequence of the system (sistemin bir sonucu), negative consequences (olumsuz sonuçlar).","e":"Whereas French children saw poverty as a consequence of the socioeconomic system, Spanish children attributed it to historical precedent.\" (Fransız çocuklar yoksulluğu sosyoekonomik sistemin bir sonucu olarak görürken, İspanyol çocuklar bunu tarihi geçmişe bağlamıştır)","t":""},{"w":"Significant","m":"Önemli, kayda değer, anlamlı.","c":"significant impact (önemli etki), morally significant (ahlaki açıdan anlamlı).","e":"Some opponents of cloning believe that such individuals would be wronged in morally significant ways.\" (Klonlamaya karşı çıkan bazı kişiler, bu tür bireylere ahlaki açıdan önemli/kayda değer yollarla haksızlık yapılacağına inanmaktadır)","t":""},{"w":"Maintain","m":"Sürdürmek, korumak. (Ayrıca \"iddia etmek\" anlamı da vardır).","c":"maintain norms (normları sürdürmek), maintain stability (istikrarı korumak).","e":"The colonies exercised social control over their members, helped to maintain norms carried over from the country of origin...\" (Koloniler üyeleri üzerinde sosyal kontrol uyguluyor, menşe ülkeden getirilen normları sürdürmeye yardımcı oluyordu...)","t":""},{"w":"Establish","m":"Kurmak, oluşturmak, saptamak.","c":"establish connections (bağlantılar kurmak), establish a fact (bir gerçeği saptamak).","e":"Between the ages of five and seven, children begin to establish connections, as their opportunities to observe monetary transactions in everyday life increase.\" (Beş ila yedi yaşları arasında, çocukların günlük yaşamdaki parasal işlemleri gözlemleme fırsatları arttıkça bağlantılar kurmaya başlarlar)","t":""},{"w":"Provide","m":"Sağlamak, temin etmek.","c":"provide insights (içgörü sağlamak), provide information (bilgi sağlamak).","e":"Understanding expertise is important because it provides insights into the nature of thinking and problem solving.\" (Uzmanlığı anlamak önemlidir çünkü düşünmenin ve problem çözmenin doğasına dair içgörüler sağlar)","t":""},{"w":"Attempt","m":"Girişim/çaba (isim), teşebbüs etmek/çalışmak (fiil).","c":"attempt to understand (anlamaya çalışmak), direct attempts (doğrudan girişimler).","e":"Such analyses attempt to understand why people act in particular ways and seek to draw general conclusions from individual cases.\" (Bu tür analizler, insanların neden belirli şekillerde davrandığını anlamaya çalışır ve bireysel vakalardan genel sonuçlar çıkarmayı amaçlar)","t":""},{"w":"Particular","m":"Belirli, özel.","c":"particular context (belirli bağlam), particular problem (belirli problem).","e":"Experts have a vast repertoire of knowledge that is relevant to their domain or discipline, but only a subset of that knowledge is relevant to any particular problem.\" (Uzmanların alanlarıyla ilgili geniş bir bilgi birikimi vardır, ancak bu bilginin sadece bir alt kümesi belirli bir problemle ilgilidir)","t":""},{"w":"Common","m":"Yaygın, ortak.","c":"common reaction (yaygın tepki), common institutions (ortak kurumlar).","e":"Each of these societies consists of individuals who share common economic, political, and legal institutions and systems.\" (Bu toplumların her biri, ortak ekonomik, siyasi ve yasal kurumları ve sistemleri paylaşan bireylerden oluşur)","t":""},{"w":"Nature","m":"Doğa, yapı, özellik, tabiat. (Sadece ağaç böcek değil, \"bir şeyin doğası\" olarak metinlerde çok geçer).","c":"nature of the task (görevin doğası), nature of the relationship (ilişkinin yapısı).","e":"The nature of the immigrant experience often shapes attitudes toward the host society.\" (Göçmen deneyiminin doğası/tabiatı, genellikle ev sahibi topluma yönelik tutumları şekillendirir)","t":""},{"w":"Role","m":"Rol, görev.","c":"play a role (rol oynamak), crucial role (kritik rol).","e":"The role of capital in economic development has been widely recognized and extensively discussed in the literature.\" (Ekonomik kalkınmada sermayenin rolü literatürde yaygın olarak kabul edilmiş ve kapsamlı bir şekilde tartışılmıştır)","t":""},{"w":"System","m":"Sistem, düzen.","c":"political system (siyasi sistem), economic system (ekonomik sistem).","e":"Fascism is an authoritarian and nationalistic right-wing system of government and social organization.\" (Faşizm, otoriter ve milliyetçi sağcı bir hükümet ve sosyal örgütlenme sistemidir)","t":""},{"w":"Increase","m":"Artmak, artırmak (fiil), artış (isim).","c":"levels increased (seviyeler arttı), steadily increase (istikrarlı bir şekilde artmak).","e":"When a lower-ranking male ascended to power, his serotonin levels increased.\" (Daha düşük rütbeli bir erkek güce yükseldiğinde serotonin seviyeleri arttı)","t":""},{"w":"Decrease","m":"Azalmak, düşmek (fiil), azalma (isim).","c":"decrease over time (zamanla azalmak), decrease as... (...dıkça azalmak).","e":"Most investigators have found that group morale and motivation decrease as communication restrictions increase.\" (Çoğu araştırmacı, iletişim kısıtlamaları arttıkça grup morali ve motivasyonunun azaldığını bulmuştur)","t":""},{"w":"Suggest","m":"İleri sürmek, öne sürmek, belirtmek, önermek.","c":"research suggests (araştırmalar öne sürüyor), evidence suggests (kanıtlar gösteriyor).","e":"The mechanistic view suggests that motivation works automatically.\" (Mekanistik görüş, motivasyonun otomatik olarak çalıştığını ileri sürer)","t":""},{"w":"Factor","m":"Faktör, etken.","c":"complicating factor (karmaşıklaştıran/zorlaştıran faktör), determining factor (belirleyici faktör).","e":"A complicating factor in human motivation is the fact that even basic motives are influenced by a variety of elements.\" (İnsan motivasyonundaki karmaşıklaştırıcı bir faktör, temel güdülerin bile çeşitli unsurlardan etkilenmesi gerçeğidir)","t":""},{"w":"Assume","m":"Varsaymak, farz etmek.","c":"assume responsibility (sorumluluk üstlenmek), generally assumed (genel olarak varsayılan).","e":"Unless we can establish that animals understand the thoughts and feelings of others, we cannot assume that their behavior is moral.\" (Hayvanların başkalarının düşünce ve duygularını anladığını saptamadığımız sürece, davranışlarının ahlaki olduğunu varsayamayız)","t":""},{"w":"Authority","m":"Otorite, yetkili (makam/kişi).","c":"authority figure (otorite figürü), obedience to authority (otoriteye itaat).","e":"Among the most controversial and widely discussed studies reported by social psychologists is Milgram's (1974) study of obedience to authority.\" (Sosyal psikologlar tarafından rapor edilen en tartışmalı ve en yaygın olarak tartışılan çalışmalar arasında Milgram'ın (1974) otoriteye itaat çalışması yer almaktadır)","t":""},{"w":"Evidence","m":"Kanıt, delil.","c":"empirical evidence (deneysel/gözlemsel kanıt), provide evidence (kanıt sunmak).","e":"But no experiment to date has provided evidence that animals are aware of others' beliefs or intentions.\" (Ancak bugüne kadarki hiçbir deney, hayvanların başkalarının inanç veya niyetlerinin farkında olduğuna dair kanıt sağlamamıştır)","t":""},{"w":"Identify","m":"Tanımlamak, tespit etmek.","c":"identify functions (işlevleri tanımlamak), easily identify (kolayca tanımlamak).","e":"Artisan experts seek to identify the functions that their clients want automated...\" (Zanaatkar uzmanlar, müşterilerinin otomatikleştirilmesini istedikleri işlevleri tespit etmeye/tanımlamaya çalışırlar...)","t":""},{"w":"Feature","m":"Özellik, nitelik.","c":"key features (temel özellikler), recognize features (özellikleri tanımak/fark etmek).","e":"Experts recognize features and patterns that are not noticed by novices...\" (Uzmanlar, acemiler tarafından fark edilmeyen özellikleri ve örüntüleri tanırlar...)","t":""},{"w":"Benefit","m":"Fayda, yarar.","c":"find no benefit (hiçbir fayda bulamamak), compensating benefits (telafi edici faydalar).","e":"He found no benefit from having the whole group participate in decisions.\" (Tüm grubun kararlara katılmasının hiçbir faydasını bulamadı)","t":""},{"w":"Expectation","m":"Beklenti.","c":"oppressive expectations (baskıcı beklentiler), meet expectations (beklentileri karşılamak).","e":"For example, a child might be constantly compared to the adult from whom he was cloned and thereby burdened with oppressive expectations.\" (Örneğin, bir çocuk sürekli olarak klonlandığı yetişkinle karşılaştırılabilir ve böylece baskıcı beklentilerle yükümlü kılınabilir)","t":""},{"w":"Variable","m":"Değişken.","c":"performance variable (performans değişkeni), introduce a new variable (yeni bir değişken eklemek).","e":"It is also important to understand that motivation is primarily a performance variable.\" (Motivasyonun öncelikle bir performans değişkeni olduğunu anlamak da önemlidir)","t":""},{"w":"Access","m":"Erişim, ulaşım (isim), erişmek (fiil).","c":"unrestricted access (sınırsız erişim), gain access (erişim sağlamak).","e":"Because high-status individuals are known to gain unrestricted access to key resources... subordinate individuals often have to settle for the leftovers.\" (Yüksek statülü bireylerin temel kaynaklara sınırsız erişim sağladığı bilindiği için... ast konumdaki bireyler genellikle artakalanlarla yetinmek zorundadır)","t":""},{"w":"Approach","m":"Yaklaşım (isim), yaklaşmak (fiil).","c":"a typical approach (tipik bir yaklaşım), cognitive approach (bilişsel yaklaşım).","e":"A typical approach is to compare the problem solutions of four or five individuals working independently...\" (Tipik bir yaklaşım, bağımsız olarak çalışan dört veya beş bireyin problem çözümlerini karşılaştırmaktır...)","t":""},{"w":"Condition","m":"Durum, rahatsızlık, hastalık.","c":"Neurological condition, rare condition.","e":"Synesthesia is a neurological condition in which one or more of the five senses, or other types of perception, cross with another.","t":""},{"w":"Perception","m":"Algı, algılama.","c":"Types of perception, human perception.","e":"Synesthesia is a neurological condition in which one or more of the five senses, or other types of perception, cross with another.","t":""},{"w":"Consistent","m":"Tutarlı, istikrarlı.","c":"Highly consistent.","e":"Unlike drug-induced hallucinations, synesthetic sensations are highly consistent.","t":""},{"w":"Prevalent","m":"Yaygın, çok rastlanan.","c":"More prevalent in.","e":"The condition is more prevalent in artists, writers and musicians...","t":""},{"w":"Evoke","m":"Çağrıştırmak, (his, anı vb.) uyandırmak.","c":"Evoke an experience, evoke smiling.","e":"...sound involuntarily evokes an experience of colour, shape, and movement.","t":""},{"w":"Enhance","m":"Geliştirmek, artırmak, iyileştirmek.","c":"Enhance cognitive abilities, enhance survival.","e":"Synesthesia can enhance cognitive abilities such as creativity and memory as it is easier to make connections between concepts.","t":""},{"w":"Overabundance","m":"Aşırı bolluk, fazlalık.","c":"Overabundance of neural connections.","e":"Research by Simon Baron-Cohen... has suggested that synesthesia results from an overabundance of neural connections.","t":""},{"w":"Prune","m":"Budamak, ayıklamak, azaltmak.","c":"Connections are pruned.","e":"Since the infant's brain is hyperconnected, and these connections are pruned as it develops, synesthesia can decrease over time.","t":""},{"w":"Inconclusive","m":"Kesin olmayan, sonuçsuz, ikna edici olmayan.","c":"Findings are inconclusive.","e":"However, these findings are inconclusive.","t":""},{"w":"Intricacy","m":"Karmaşıklık, incelik, detay.","c":"Intricacies of the brain.","e":"With 86 billion neurons and 100 trillion synapses, we have only grasped the tip of the iceberg in understanding the intricacies of the brain.","t":""},{"w":"Affirm","m":"Doğrulamak, onaylamak, tasdik etmek.","c":"Affirm one another.","e":"In every level of human society, people continuously affirm one another in various ways...","t":""},{"w":"Paradoxically","m":"Çelişkili bir biçimde, paradoksal olarak.","c":"Paradoxically present.","e":"...and thus, paradoxically, an element of confirmation is still present.","t":""},{"w":"Tangential","m":"Teğet geçen, dolaylı, konu dışı.","c":"Tangential response, reacting tangentially.","e":"By reacting indifferently, unreceptively, tangentially, and so on, one fails to approve some aspects of the other.","t":""},{"w":"Evocative","m":"Çağrışımsal, uyandıran (harekete geçiren).","c":"Evocative action.","e":"A confirmatory response is relevant to the evocative or initiating action...","t":""},{"w":"Persistent","m":"Kalıcı, ısrarlı, sürekli.","c":"Persistent disconfirmation.","e":"...but a child who has been subjected to indirect but persistent disconfirmation, usually unwittingly.","t":""},{"w":"Unwittingly","m":"Farkında olmadan, bilmeden.","c":"Subjected unwittingly.","e":"...a child who has been subjected to indirect but persistent disconfirmation, usually unwittingly.","t":""},{"w":"S const store={
  get(k,def){try{const v=localStorage.getItem(k);return v==null?def:JSON.parse(v)}catch(e){return def}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
};
let known = new Set(store.get('known_v1',[]));
function saveKnown(){store.set('known_v1',[...known])}

const $=s=>document.querySelector(s);
const $$=s=>[...document.querySelectorAll(s)];
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* highlight target word inside example sentence */
function highlightEx(ex, word){
  if(!ex) return '';
  const base = word.split(/[ /]/)[0].replace(/[^A-Za-z]/g,'');
  if(base.length<3) return esc(ex);
  const stem = base.length>5?base.slice(0,Math.max(4,base.length-2)):base;
  try{
    const re=new RegExp('\\b('+stem+"[a-zA-Z]*)\\b",'gi');
    return esc(ex).replace(re,'<span class="hl">$1</span>');
  }catch(e){return esc(ex)}
}

}

const listEl=$('#list'), metaEl=$('#list-meta');
function renderList(filter=''){
  const f=filter.trim().toLocaleLowerCase('tr');

  if(f){
    arr=WORDS.filter(d=>(d.w+' '+d.m+' '+d.c+' '+d.e+' '+d.t).toLocaleLowerCase('tr').includes(f));
  }
  metaEl.textContent = f ? (arr.length+' sonuç') : (WORDS.length+' kelime · alfabetik değil, çalışma sırasında');
  if(!arr.length){listEl.innerHTML='<div class="empty">Eşleşen kelime yok 🔍<br>Farklı bir terim deneyin.</div>';return}
  listEl.innerHTML=arr.map(d=>`
    <div class="wcard" data-id="${d.id}">
      <div class="txt">
        <div class="w">${esc(d.w)}${d.t?`<span class="tag">${esc(d.t)}</span>`:''}</div>

function openSheet(id){

  $('#d-coll-f').style.display=d.c?'':'none';

  $('#d-theme').textContent=d.t;
  $('#d-ex').innerHTML=highlightEx(d.e,d.w);
  $('#sheet-bg').classList.add('open');
  $('#sheet').classList.add('open');
}
function closeSheet(){$('#sheet-bg').classList.remove('open');$('#sheet').classList.remove('open')}
$('#sheet-bg').onclick=closeSheet;
let sy=0;
$('#sheet').addEventListener('touchstart',e=>sy=e.touches[0].clientY,{passive:true});
$('#sheet').addEventListener('touchmove',e=>{const dy=e.touches[0].clientY-sy;if(dy>0&&$('#sheet').scrollTop<=0)$('#sheet').style.transform='translateY('+dy+'px)'},{passive:true});

    $('#fc-bcoll-w').style.display=d.c?'':'none';
    $('#fc-bcoll').textContent=d.c;
    $('#fc-bex').innerHTML=highlightEx(d.e,d.w);
    $('#fc-knownbadge').textContent=known.has(d.id)?'✓ biliniyor':'';
  },$('#card').classList.contains('flipped')?260:0);
  $('#fc-num').textContent=(fcIdx+1)+' / '+deck.length;
  $('#fc-prog').style.width=((fcIdx+1)/deck.length*100)+'%';
  const isK=known.has(d.id);
  const kb=$('#fc-know');kb.classList.toggle('known',isK);kb.textContent=isK?'✓ Biliniyor':'Biliyorum';
}
$('#card').onclick=()=>$('#card').classList.toggle('flipped');
$('#fc-next').onclick=()=>{fcIdx++;renderCard()};
$('#fc-prev').onclick=()=>{fcIdx=Math.max(0,fcIdx-1);renderCard()};
$('#fc-know').onclick=e=>{e.stopPropagation();const deck=fcDeck();if(!deck.length)return;const d=WORDS[deck[fcIdx]];if(known.has(d.id))known.delete(d.id);else known.add(d.id);saveKnown();renderCard()};
$('#fc-shuffle').onclick=()=>{for(let i=fcOrder.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[fcOrder[i],fcOrder[j]]=[fcOrder[j],fcOrder[i]]}fcIdx=0;renderCard()};
$('#fc-onlyunknown').onclick=function(){fcOnlyUnknown=!fcOnlyUnknown;this.classList.toggle('on',fcOnlyUnknown);fcIdx=0;renderCard()};
$('#fc-reset').onclick=()=>{if(confirm('Tüm "biliniyor" işaretlerini sıfırla?')){known.clear();saveKnown();renderCard()}};
// swipe
let cx=0;
$('#card').addEventListener('touchstart',e=>cx=e.touches[0].clientX,{passive:true});
$('#card').addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-cx;if(Math.abs(dx)>60){if(dx<0)$('#fc-next').click();else $('#fc-prev').click()}});

/* ===== QUIZ ===== */
let quizActive=false,quizDir='en2tr',quizQs=[],quizI=0,quizScore=0,quizLen=10;
const qroot=$('#quiz-root');
function quizSetup(){
  quizActive=false;
  qroot.innerHTML=`
    <div class="q-setup">
      <div class="q-head">Quiz'e hazır mısın?</div>
      <div class="q-sub">450 kelimeden rastgele çoktan seçmeli sorular. Yön ve uzunluk seç, başla.</div>
      <div class="seg" id="q-dir">
        <button data-d="en2tr" class="on">İng → Türkçe</button>
        <button data-d="tr2en">Türkçe → İng</button>
      </div>
      <div class="seg" id="q-len">
        <button data-n="10" class="on">10 soru</button>
        <button data-n="20">20 soru</button>
        <button data-n="450">Tümü</button>
      </div>
      <button class="big-btn" id="q-start">Başla</button>
    </div>`;
  $('#q-dir').querySelectorAll('button').forEach(b=>b.onclick=()=>{$('#q-dir').querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');quizDir=b.dataset.d});
  $('#q-len').querySelectorAll('button').forEach(b=>b.onclick=()=>{$('#q-len').querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');quizLen=+b.dataset.n});
  $('#q-start').onclick=quizStart;
}
function shuffled(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function quizStart(){
  quizActive=true;quizI=0;quizScore=0;
  const pool=shuffled([...WORDS.keys()]);
  quizQs=pool.slice(0,Math.min(quizLen,pool.length));
  renderQ();
}
function renderQ(){
  if(quizI>=quizQs.length)return quizDone();
  const d=WORDS[quizQs[quizI]];
  const ask = quizDir==='en2tr'?d.w:d.m;
  const correct = quizDir==='en2tr'?d.m:d.w;
  // build 3 distractors (unique text)
  const others=shuffled([...WORDS.keys()].filter(i=>i!==d.id));
  const opts=[correct];const seen=new Set([correct.toLowerCase()]);
  for(const i of others){const t=quizDir==='en2tr'?WORDS[i].m:WORDS[i].w;if(!seen.has(t.toLowerCase())){seen.add(t.toLowerCase());opts.push(t)}if(opts.length>=4)break}
  const shOpts=shuffled(opts);
  qroot.innerHTML=`
    <div class="q-top"><span class="q-count">Soru ${quizI+1} / ${quizQs.length}</span><span class="q-score">${quizScore} doğru</span></div>
    <div class="q-prog"><i style="width:${quizI/quizQs.length*100}%"></i></div>
    <div class="q-prompt">${quizDir==='en2tr'?'Türkçe anlamı?':'İngilizce karşılığı?'}</div>
    <div class="q-word">${esc(ask)}</div>
    <div class="q-opts" id="q-opts">
      ${shOpts.map(o=>`<button class="q-opt" data-o="${esc(o)}">${esc(o)}</button>`).join('')}
    </div>`;
  $$('#q-opts .q-opt').forEach(b=>b.onclick=()=>answerQ(b,correct,d));
}
function answerQ(btn,correct,d){
  const ok=btn.dataset.o===correct;
  if(ok){quizScore++;btn.classList.add('correct')}
  else{btn.classList.add('wrong')}
  $$('#q-opts .q-opt').forEach(b=>{
    b.style.pointerEvents='none';
    if(b.dataset.o===correct)b.classList.add('correct');
    else if(b!==btn)b.classList.add('dim');
  });
  $('.q-score').textContent=quizScore+' doğru';
  const nx=document.createElement('button');
  nx.className='big-btn q-next';nx.textContent=(quizI+1>=quizQs.length)?'Sonuçları gör':'Sonraki soru →';
  nx.onclick=()=>{quizI++;renderQ()};
  qroot.appendChild(nx);
}
function quizDone(){
  const pct=Math.round(quizScore/quizQs.length*100);
  let msg=pct>=90?'Müthiş! 🌟':pct>=70?'Çok iyi gidiyorsun 👏':pct>=50?'Fena değil, devam 💪':'Tekrar çalışmaya değer 📚';
  qroot.innerHTML=`
    <div class="q-done">
      <div class="scorebig">${quizScore}/${quizQs.length}</div>
      <div class="scoremsg">%${pct} · ${msg}</div>
      <button class="big-btn" id="q-again">Yeni quiz</button>
      <button class="big-btn ghost" id="q-menu" style="margin-top:10px">Ayarlara dön</button>
    </div>`;
  burst();
  $('#q-again').onclick=quizStart;
  $('#q-menu').onclick=quizSetup;
}

/* ===== MATCH ===== */
let matchActive=false,matchSel=null,matchPairs=6,matchMoves=0,matchDone=0,matchTotal=0;
const mroot=$('#match-root');
function matchSetup(){
  matchActive=false;
  mroot.innerHTML=`
    <div class="m-setup">
      <div class="q-head">Kelime Eşleştirme</div>
      <div class="q-sub">İngilizce kelimeleri Türkçe anlamlarıyla eşleştir. Soldan bir kelimeye, sağdan anlamına dokun.</div>
      <div class="seg" id="m-n">
        <button data-n="5" class="on">5 çift</button>
        <button data-n="6">6 çift</button>
        <button data-n="8">8 çift</button>
      </div>
      <button class="big-btn" id="m-start">Başla</button>
    </div>`;
  $('#m-n').querySelectorAll('button').forEach(b=>b.onclick=()=>{$('#m-n').querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');matchPairs=+b.dataset.n});
  $('#m-start').onclick=matchStart;
}
function matchStart(){
  matchActive=true;matchSel=null;matchMoves=0;matchDone=0;matchTotal=matchPairs;
  const picks=shuffled([...WORDS.keys()]).slice(0,matchPairs);
  const left=picks.map(i=>({id:i,txt:WORDS[i].w}));
  const right=shuffled(picks.map(i=>({id:i,txt:WORDS[i].m})));
  mroot.innerHTML=`
    <div class="m-stat"><span id="m-progress">0 / ${matchPairs} eşleşti</span><span id="m-moves">0 hamle</span></div>
    <div class="m-cols">
      <div class="m-col">${left.map(o=>`<button class="m-item en" data-side="L" data-id="${o.id}">${esc(o.txt)}</button>`).join('')}</div>
      <div class="m-col">${right.map(o=>`<button class="m-item" data-side="R" data-id="${o.id}">${esc(o.txt)}</button>`).join('')}</div>
    </div>`;
  $$('.m-item').forEach(it=>it.onclick=()=>matchTap(it));
}
function matchTap(it){
  if(it.classList.contains('done'))return;
  if(!matchSel){
    if(it.classList.contains('sel')){it.classList.remove('sel');matchSel=null;return}
    $$('.m-item.sel').forEach(x=>x.classList.remove('sel'));
    it.classList.add('sel');matchSel=it;return;
  }
  if(it===matchSel){it.classList.remove('sel');matchSel=null;return}
  if(it.dataset.side===matchSel.dataset.side){ // switch selection on same side
    matchSel.classList.remove('sel');it.classList.add('sel');matchSel=it;return;
  }
  matchMoves++;$('#m-moves').textContent=matchMoves+' hamle';
  if(it.dataset.id===matchSel.dataset.id){
    it.classList.add('done');matchSel.classList.add('done');matchSel=null;
    matchDone++;$('#m-progress').textContent=matchDone+' / '+matchTotal+' eşleşti';
    if(matchDone===matchTotal)matchWin();
  }else{
    const a=it,b=matchSel;a.classList.add('bad');b.classList.add('bad');matchSel=null;
    setTimeout(()=>{a.classList.remove('bad','sel');b.classList.remove('bad','sel')},420);
  }
}
function matchWin(){
  burst();
  setTimeout(()=>{
    mroot.innerHTML=`
      <div class="q-done">
        <div class="scorebig">🎯</div>
        <div class="scoremsg">${matchTotal} çiftin hepsini ${matchMoves} hamlede eşleştirdin!</div>
        <button class="big-btn" id="m-again">Tekrar oyna</button>
        <button class="big-btn ghost" id="m-menu" style="margin-top:10px">Ayarlara dön</button>
      </div>`;
    $('#m-again').onclick=matchStart;
    $('#m-menu').onclick=matchSetup;
  },500);
}

/* ===== confetti ===== */
function burst(){
  const c=document.createElement('div');c.className='confetti';document.body.appendChild(c);
  const cols=['#D55B36','#2E7D6F','#C99A2E','#3F8F5B'];
  for(let i=0;i<60;i++){
    const p=document.createElement('div');
    const s=6+Math.random()*7;
    p.style.cssText=`position:absolute;top:-20px;left:${Math.random()*100}%;width:${s}px;height:${s*0.5}px;background:${cols[i%4]};border-radius:2px;opacity:.95;transform:rotate(${Math.random()*360}deg)`;
    c.appendChild(p);
    const dur=1200+Math.random()*1200;
    p.animate([{transform:`translateY(0) rotate(0)`,opacity:1},{transform:`translateY(${window.innerHeight+60}px) rotate(${Math.random()*720}deg)`,opacity:.9}],{duration:dur,easing:'cubic-bezier(.3,.6,.5,1)'});
    setTimeout(()=>p.remove(),dur);
  }
  setTimeout(()=>c.remove(),2600);
}

/* ===== init ===== */
$('#bar-count').textContent=WORDS.length+' kelime';
renderList('');
renderCard();
</script>
